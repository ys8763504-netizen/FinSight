{% extends "dashboard.html" %}
{% block dash %}

<div class="category-container">

    <h2>Manage Categories</h2>

    <!-- ADD FORM -->
    <form method="POST" action="{% url "add_category" %}" onsubmit="return validateCategory()">
        {% csrf_token %}
        <input type="text" id="name" name="name" placeholder="Enter category">
        <button type="submit">Add Category</button>
        {% if messages %}
            {% for message in messages %}
                <span  style="color:red;">{{message}}</span>
            {% endfor %} 
        {% endif %}
    </form>

    <!-- CATEGORY LIST -->
    <div class="category-list">
        <h3>Your Categories</h3>
        <table>
        <tr>
            <td>Categories</td>
            <td>Action</td>
        </tr>
        {% for cat in categories %}
        <tr> 
            <td>{{ cat.name }}</td>
            <td>
                <a href="{% url 'delete_category' cat.id %}" class="action-btn">Delete</a>
            </td>     
        </tr>
        {% endfor %}
        </table>
    </div>

</div>
</script>

<style>
/* Page background (blur + gradient feel) */
body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    font-family: 'Inter', sans-serif;
}

/* Main Container */
.category-container {
    width: 420px;
    margin: 100px auto;
    padding: 25px;
    border-radius: 15px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(15px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    color: #fff;
    animation: fadeIn 0.5s ease-in-out;
}

/* Heading */
.category-container h2 {
    text-align: center;
    margin-bottom: 20px;
    font-weight: 600;
}

/* Input */
input {
    width: 65%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
    margin-right: 10px;
}

/* Button */
.category-container button {
    padding: 10px 15px;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
    margin-top:10px;
}

.category-container button:hover {
    transform: scale(1.05);
    background: linear-gradient(135deg, #16a34a, #15803d);
}

/* Messages */
span {
    display: block;
    margin-top: 10px;
    color: #f87171;
    font-size: 14px;
}

/* Table */
.category-list {
    margin-top: 25px;
}

.category-list table {
    width: 100%;
    border-collapse: collapse;
}

/* Table Header */
.category-list th {
    text-align: left;
    padding: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 5px;
}

/* Table Rows */
.category-list td {
    padding: 10px;
    background: rgba(255,255,255,0.05);
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

/* Hover Effect */
.category-list tr:hover td {
    background: rgba(34,197,94,0.2);
    transition: 0.3s;
}

/* Action Button (future delete/edit) */
.action-btn {
    color: #f87171;
    cursor: pointer;
    font-weight: bold;
}

.action-btn:hover {
    color: #ef4444;
}

/* Animation */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* =========================
   DESKTOP (1025px+)
   ========================= */
@media (min-width: 1025px) {

    .category-container {
        width: 420px;
        margin: 100px auto;
    }

    input {
        width: 65%;
    }
}


/* =========================
   TABLET (768px - 1024px)
   ========================= */
@media (max-width: 1024px) and (min-width: 768px) {

    .category-container {
        width: 80%;
        margin: 60px auto;
        padding: 25px;
    }

    input {
        width: 60%;
    }

    .category-container button {
        width: auto;
    }
}


/* =========================
   LARGE MOBILE (481px - 767px)
   ========================= */
@media (max-width: 767px) {

    .category-container {
        width: 90%;
        margin: 40px auto;
        padding: 20px;
    }

    /* Stack input + button */
    form {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    input {
        width: 100%;
        margin-right: 0;
    }

    .category-container button {
        width: 100%;
    }

    .category-list table {
        font-size: 14px;
    }

    .category-list td {
        padding: 8px;
    }
}


/* =========================
   SMALL MOBILE (<=480px)
   ========================= */
@media (max-width: 480px) {

    .category-container {
        width: 95%;
        margin: 20px auto;
        padding: 15px;
        border-radius: 12px;
    }

    h2 {
        font-size: 18px;
        text-align: center;
    }

    input {
        width: 100%;
        font-size: 14px;
        padding: 8px;
    }

    .category-container button {
        width: 100%;
        font-size: 14px;
        padding: 10px;
    }

    .category-list h3 {
        font-size: 16px;
        text-align: center;
    }

    .category-list table {
        font-size: 13px;
    }

    .category-list td {
        padding: 6px;
    }

    .action-btn {
        font-size: 13px;
    }
}
</style>

{% endblock %}
