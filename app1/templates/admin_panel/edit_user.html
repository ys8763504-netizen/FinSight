<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit User</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:linear-gradient(to right,#0f172a,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    width:400px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input, select{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:10px;
    background:#3b82f6;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#2563eb;
}

.back{
    display:block;
    text-align:center;
    margin-top:10px;
    color:#555;
}

/* MOBILE */
@media(max-width:500px){
    .container{
        width:90%;
    }
}
</style>
</head>

<body>

<div class="container">

<h2>Edit User</h2>


<form method="POST" action="{% url "update_user" user.id %}">
    {% csrf_token %}

    <input type="text" name="name" value="{{ user.name }}" required>
    <input type="text" name="mobile" value="{{ user.mobile }}" required>
    <input type="email" name="email" value="{{ user.email }}" required>

    <select name="gender">
        <option {% if user.gender == "Male" %}selected{% endif %}>Male</option>
        <option {% if user.gender == "Female" %}selected{% endif %}>Female</option>
        <option {% if user.gender == "Other" %}selected{% endif %}>Other</option>
    </select>

    <input type="date" name="date_of_birth" value="{{ user.date_of_birth|date:'Y-m-d' }}" required>

    <input type="text" name="country" value="{{ user.country }}" required>

    <button type="submit">Update User</button>
</form>

<a href="{% url 'admin_dashboard' %}" class="back">⬅ Back to Dashboard</a>

</div>

</body>
</html>
