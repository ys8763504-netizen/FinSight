<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - FinSight</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Inter',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e293b);
        }

        .login-container{
            background:rgba(255,255,255,0.08);
            padding:30px;
            border-radius:15px;
            width:350px;
            backdrop-filter:blur(12px);
            box-shadow:0 10px 30px rgba(0,0,0,0.4);
        }

        h2{
            text-align:center;
            color:white;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:none;
            border-radius:8px;
            outline:none;
        }

        button{
            width:100%;
            padding:12px;
            background:#3b82f6;
            border:none;
            border-radius:8px;
            color:white;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#2563eb;
        }

        .msg{
            color:#ff6b6b;
            text-align:center;
            margin-bottom:10px;
        }

        .footer{
            text-align:center;
            margin-top:10px;
            font-size:12px;
            color:#cbd5f5;
        }
    </style>
</head>

<body>

<div class="login-container">

    <h2>Admin Login 👑</h2>

    {% if messages %}
        {% for message in messages %}
            <p class="msg">{{ message }}</p>
        {% endfor %}
    {% endif %}

    <form method="POST" action="{% url "admin_login" %}">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Admin Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="footer">    
        FinSight Admin Panel
    </div>

</div>

</body>
</html>
